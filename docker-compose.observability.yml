# LOCAL DEVELOPMENT ONLY — not for production deployment.
# Grafana runs with anonymous admin access and Prometheus metrics are unauthenticated.
# Bind these ports to localhost only (127.0.0.1) or add auth before exposing publicly.
version: "3.9"
services:
  quantforge:
    build: .
    ports:
      - "8000:8000"
    environment:
      - ALPHA_VANTAGE_KEY=${ALPHA_VANTAGE_KEY:-demo}
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.52.0
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    restart: unless-stopped

  grafana:
    image: grafana/grafana:10.4.2
    ports:
      - "3000:3000"
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true   # local dev only
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin # local dev only — disable before exposing publicly
    volumes:
      - ./observability/grafana/datasources:/etc/grafana/provisioning/datasources:ro
    restart: unless-stopped
